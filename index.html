<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
</head>
<style>
  *{
    margin:0;
    padding:0;
    font-family: Arial, Helvetica, sans-serif;
    box-sizing: border-box;
  }
  html,body{
    height: 100%;
    width: 100%;
  }

  #main{
    display: flex;
    align-items: center;
    justify-content: center;
     height: 100%;
    width: 100%;
    background-color: grey;
  }

  h1{
    color: #555;
    font-size: 10rem;
    font-weight: 300;
    user-select: none;
  }

  input{
    display: none;
  }
  #btn{
    user-select: none;
    padding: 12px 22px;
    background-color: rgb(34, 218, 235);
    color: white;
    font-weight: 800;
    border-radius: 10px;
    cursor: pointer;
  }

  #btn:hover{
    background-color: aquamarine;
  }
   
</style>
<body>
  <div id="main">
    <input id="fileinp" type="file">
    <div id="btn">
      Upload File
    </div>
  </div>

  <script src="function.js"></script>
</body>
</html>
