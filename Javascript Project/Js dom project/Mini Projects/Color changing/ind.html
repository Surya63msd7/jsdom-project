<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Change</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
  <h1 class="heading">Color Changing</h1>
  <div class="inputBtnContainer">
    <button class="randomBtn">Random Color</button>
    <input  id="colorInput" type="text" placeholder="Enter a color or hex">
    <button class="applyBtn">Apply Color</button>
    
  </div>
  <p class="currentColor">Current Color: <span class="currentColorValue">green</span></p>
  </div>


  <script src="fox.js"></script>
</body>
</html>
